{% extends "base.html" %} {% block title %}404 - Page Not Found - Resuma{%
endblock %} {% block page_title %}Page Not Found{% endblock %} {% block content
%}
<div class="error-container">
  <div class="error-card">
    <div class="error-icon">
      <i class="fas fa-search"></i>
    </div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn't exist or has been moved.</p>
    <div class="error-actions">
      <a
        href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}"
        class="btn-primary"
      >
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="javascript:history.back()" class="btn-secondary">
        <i class="fas fa-arrow-left"></i> Go Back
      </a>
    </div>
  </div>
</div>

<style>
  .error-container {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .error-card {
    text-align: center;
    max-width: 500px;
    padding: 3rem;
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  }

  .error-icon {
    font-size: 5rem;
    color: var(--primary);
    margin-bottom: 1rem;
  }

  .error-card h1 {
    font-size: 6rem;
    color: var(--danger);
    margin-bottom: 0.5rem;
  }

  .error-card h2 {
    font-size: 1.5rem;
    color: var(--gray-800);
    margin-bottom: 1rem;
  }

  .error-card p {
    color: var(--gray-600);
    margin-bottom: 2rem;
  }

  .error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
  }
</style>
{% endblock %}
