{% extends "base.html" %} {% block title %}500 - Server Error - Resuma{%
endblock %} {% block page_title %}Server Error{% endblock %} {% block content %}
<div class="error-container">
  <div class="error-card">
    <div class="error-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1>500</h1>
    <h2>Internal Server Error</h2>
    <p>Something went wrong on our end. Please try again later.</p>
    <div class="error-actions">
      <a
        href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}"
        class="btn-primary"
      >
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="javascript:location.reload()" class="btn-secondary">
        <i class="fas fa-sync-alt"></i> Try Again
      </a>
    </div>
  </div>
</div>
{% endblock %}
