{% extends "base.html" %} {% block title %}403 - Access Denied - Resuma{%
endblock %} {% block page_title %}Access Denied{% endblock %} {% block content
%}
<div class="error-container">
  <div class="error-card">
    <div class="error-icon">
      <i class="fas fa-lock"></i>
    </div>
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p>You don't have permission to access this page.</p>
    <div class="error-actions">
      <a
        href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}"
        class="btn-primary"
      >
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="{{ url_for('auth.login') }}" class="btn-secondary">
        <i class="fas fa-sign-in-alt"></i> Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
