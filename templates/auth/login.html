{% extends "base.html" %} {% block auth_content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-large">
        <i class="fas fa-file-alt"></i>
        <h2>Resuma</h2>
      </div>
      <h3>Welcome Back</h3>
      <p>Sign in to your account to continue</p>
    </div>

    <form method="POST" class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group password-group">
          <i class="fas fa-lock input-icon"></i>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Enter your password"
          />
          <button type="button" class="toggle-password" data-target="password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" />
          <span class="checkbox-text">Remember me</span>
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link"
          >Forgot Password?</a
        >
      </div>

      <button type="submit" class="btn-primary btn-block">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>
        Don't have an account?
        <a href="{{ url_for('auth.register') }}">Sign up</a>
      </p>
    </div>
  </div>
</div>

<style>
  /* Same styles as register.html - add these */
  .auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 1rem;
  }

  .auth-card {
    background: var(--white);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-large {
    margin-bottom: 1.5rem;
  }

  .logo-large i {
    font-size: 3rem;
    color: var(--primary);
  }

  .logo-large h2 {
    margin-top: 0.5rem;
    color: var(--gray-800);
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: var(--gray-700);
  }

  .input-group {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-group .input-icon {
    position: absolute;
    left: 1rem;
    color: var(--gray-400);
    font-size: 1rem;
    pointer-events: none;
  }

  .input-group input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border: 1px solid var(--gray-300);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.3s;
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  .password-group .toggle-password {
    position: absolute;
    right: 1rem;
    background: none;
    border: none;
    color: var(--gray-400);
    cursor: pointer;
    padding: 0;
    font-size: 1rem;
  }

  .checkbox-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 1.5rem 0;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }

  .checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .forgot-link {
    color: var(--primary);
    text-decoration: none;
    font-size: 0.85rem;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .btn-primary {
    background: linear-gradient(
      135deg,
      var(--primary) 0%,
      var(--primary-dark) 100%
    );
    color: white;
    border: none;
    padding: 0.875rem;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
  }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--gray-200);
  }

  .auth-footer a {
    color: var(--primary);
    text-decoration: none;
  }
</style>
{% endblock %}
